name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform fmt / validate / plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ matrix.environment }}.tfvars" \
            -var="db_password=placeholder-not-real" \
            -refresh=false \
            -no-color \
            -out=tfplan.binary 2>&1 | tee plan_output.txt || true
          terraform show -no-color tfplan.binary > plan_readable.txt 2>/dev/null || true

      - name: Upload plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            infra/envs/${{ matrix.environment }}/plan_output.txt
            infra/envs/${{ matrix.environment }}/plan_readable.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/${{ matrix.environment }}/plan_output.txt';
            let output = 'No plan output found.';
            if (fs.existsSync(path)) {
              output = fs.readFileSync(path, 'utf8').slice(0, 60000);
            }
            const body = `#### Terraform Plan — \`${{ matrix.environment }}\`
            \`\`\`
            ${output}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
